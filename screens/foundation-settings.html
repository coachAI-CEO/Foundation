<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Foundation - Settings</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--void:#0b0b0c;--base:#111113;--card:#161618;--raised:#1c1c1f;--border:rgba(255,255,255,0.055);--border-warm:rgba(210,185,130,0.22);--gold:#d4b978;--gold-br:#ecd49a;--gold-dim:rgba(212,185,120,0.08);--white:#ede9e3;--muted:#5c5850;--soft:#8a8478;--green-br:#72b08a;--green-dim:rgba(78,122,94,0.12);--red-br:#cc8888;--amber:#d4903a;--blue-br:#7aaac8;--r:16px;--r-sm:10px;}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#080809;color:var(--white);font-family:'DM Sans',sans-serif;}
.atmo{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 55% 35% at 50% -5%,rgba(212,185,120,0.04) 0%,transparent 60%);}
.view-toggle{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:9999;display:flex;align-items:center;background:rgba(11,11,12,0.92);border:1px solid var(--border-warm);border-radius:12px;padding:4px;backdrop-filter:blur(20px);}
.vbtn{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all 0.2s;}
.vbtn.active{background:var(--gold);color:#0b0b0c;font-weight:600;}
.vdiv{width:1px;height:18px;background:var(--border);margin:0 2px;}
body.mode-mobile{display:flex;justify-content:center;padding-top:60px;padding-bottom:40px;min-height:100vh;}
body.mode-mobile .desktop-shell{display:none;}
.mobile-shell{width:390px;border-radius:44px;overflow:hidden;box-shadow:0 0 0 10px #0d0d0f,0 0 0 12px #1e1e22,0 0 0 13px #0d0d0f,0 40px 100px rgba(0,0,0,0.9);background:var(--void);min-height:844px;flex-shrink:0;display:flex;flex-direction:column;position:relative;}
.mobile-shell::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);width:126px;height:34px;background:#0d0d0f;border-radius:0 0 22px 22px;z-index:99;pointer-events:none;}
body.mode-desktop .mobile-shell{display:none;}
body.mode-desktop{display:block;min-height:100vh;}
.desktop-shell{display:grid;grid-template-columns:64px 1fr;min-height:calc(100vh - 52px);margin-top:52px;}
.btn-primary{display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;border-radius:var(--r-sm);background:var(--gold);color:#0b0b0c;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-primary:hover{background:var(--gold-br);}
.btn-ghost{display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:8px;background:transparent;border:1px solid var(--border);color:var(--soft);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.18s;white-space:nowrap;}
.btn-ghost:hover{border-color:var(--border-warm);color:var(--white);}
.d-sidebar{background:var(--base);border-right:1px solid var(--border);display:flex;flex-direction:column;align-items:center;padding:20px 0;gap:4px;position:sticky;top:52px;height:calc(100vh - 52px);}
.d-nav{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all 0.2s;color:var(--muted);position:relative;}
.d-nav:hover{color:var(--white);background:var(--raised);}
.d-nav.active{color:var(--gold);background:var(--gold-dim);}
.d-nav.active::before{content:'';position:absolute;left:-1px;width:2px;height:18px;background:var(--gold);border-radius:0 2px 2px 0;}
.d-tip{position:absolute;left:50px;background:var(--raised);border:1px solid var(--border);color:var(--white);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 10px;border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.15s;z-index:100;}
.d-nav:hover .d-tip{opacity:1;}
.d-sidebar-bot{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:8px;}
.d-avatar{width:30px;height:30px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold);display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gold);font-weight:700;cursor:pointer;}
.d-main{overflow-y:auto;}
.d-topbar{padding:22px 32px 18px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);background:var(--void);position:sticky;top:0;z-index:10;}
.d-page-title{font-family:'Cinzel',serif;font-size:22px;font-weight:700;letter-spacing:0.1em;}
.m-header{padding:44px 20px 0;flex-shrink:0;}
.m-page-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;letter-spacing:0.1em;}
.m-page-sub{font-size:11px;color:var(--muted);margin-bottom:16px;}
.m-scroll{flex:1;overflow-y:auto;padding:0 20px 20px;}
.m-bottom-nav{display:flex;align-items:center;justify-content:space-around;padding:8px 0 28px;border-top:1px solid var(--border);background:var(--void);flex-shrink:0;}
.m-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 12px;cursor:pointer;}
.m-nav-icon{display:flex;align-items:center;justify-content:center;color:var(--muted);}
.m-nav-label{font-size:8px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);}
.m-nav-item.active .m-nav-label,.m-nav-item.active .m-nav-icon{color:var(--gold);}
.m-fab{width:50px;height:50px;border-radius:50%;background:var(--gold);display:flex;align-items:center;justify-content:center;color:#0b0b0c;cursor:pointer;border:none;}

/* SETTINGS LAYOUT */
.settings-wrap{max-width:680px;margin:0 auto;padding:28px 32px;}
.settings-section{margin-bottom:28px;}
.settings-section-title{font-family:'Cinzel',serif;font-size:11px;font-weight:600;letter-spacing:0.16em;text-transform:uppercase;color:var(--muted);margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.settings-section-title::after{content:'';flex:1;height:1px;background:var(--border);}
.settings-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;}
.settings-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid var(--border);transition:background 0.15s;cursor:pointer;}
.settings-row:last-child{border-bottom:none;}
.settings-row:hover{background:var(--raised);}
.settings-row.no-hover{cursor:default;}
.settings-row.no-hover:hover{background:transparent;}
.sr-left{display:flex;align-items:center;gap:12px;}
.sr-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.sr-label{font-size:13px;font-weight:500;color:var(--white);}
.sr-sub{font-size:11px;color:var(--muted);margin-top:1px;}
.sr-right{display:flex;align-items:center;gap:8px;}
.sr-value{font-size:12px;color:var(--soft);}
.sr-chevron{color:var(--muted);}
/* TOGGLE */
.toggle{width:44px;height:24px;border-radius:12px;background:var(--raised);border:1px solid var(--border);position:relative;cursor:pointer;transition:all 0.25s;flex-shrink:0;}
.toggle.on{background:var(--green-br);border-color:var(--green-br);}
.toggle-thumb{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:50%;background:var(--muted);transition:all 0.25s;}
.toggle.on .toggle-thumb{left:22px;background:#fff;}
/* PROFILE CARDS */
.profile-pair{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:0;}
.profile-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;}
.pc-avatar{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:700;letter-spacing:0.06em;margin-bottom:10px;}
.pc-name{font-size:14px;font-weight:600;color:var(--white);margin-bottom:2px;}
.pc-role{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:0.08em;margin-bottom:10px;}
.pc-field{margin-bottom:8px;}
.pc-field-label{font-size:9px;text-transform:uppercase;letter-spacing:0.1em;color:var(--muted);margin-bottom:4px;}
.pc-field-val{font-size:12px;color:var(--soft);}
/* INTEGRATION ROW */
.int-badge{padding:3px 9px;border-radius:20px;font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;}
.int-connected{background:var(--green-dim);color:var(--green-br);border:1px solid rgba(78,122,94,0.2);}
.int-disconnected{background:var(--raised);color:var(--muted);border:1px solid var(--border);}
/* DANGER ZONE */
.danger-card{background:var(--red-dim);border:1px solid rgba(204,136,136,0.2);border-radius:var(--r);}
.danger-row{display:flex;align-items:center;justify-content:space-between;padding:14px 18px;border-bottom:1px solid rgba(204,136,136,0.12);}
.danger-row:last-child{border-bottom:none;}
.danger-label{font-size:13px;color:var(--red-br);font-weight:500;}
.danger-sub{font-size:11px;color:rgba(204,136,136,0.6);margin-top:1px;}
.btn-danger{padding:8px 14px;border-radius:8px;background:transparent;border:1px solid rgba(204,136,136,0.3);color:var(--red-br);font-family:'DM Sans',sans-serif;font-size:11px;cursor:pointer;transition:all 0.18s;}
.btn-danger:hover{background:var(--red-dim);}

::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(212,185,120,0.18);border-radius:4px;}
::-webkit-scrollbar-thumb:hover{background:rgba(212,185,120,0.38);}
*{scrollbar-width:thin;scrollbar-color:rgba(212,185,120,0.18) transparent;}
</style>
</head>
<body class="mode-mobile">
<div class="atmo"></div>
<div class="view-toggle">
  <button class="vbtn active" id="btn-mobile" onclick="setView('mobile')">
    <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="3" y="1" width="8" height="12" rx="1.5"/><circle cx="7" cy="10.5" r="0.8" fill="currentColor" stroke="none"/></svg>Mobile
  </button>
  <div class="vdiv"></div>
  <button class="vbtn" id="btn-desktop" onclick="setView('desktop')">
    <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="1" y="2" width="12" height="8" rx="1"/><line x1="4" y1="12" x2="10" y2="12"/><line x1="7" y1="10" x2="7" y2="12"/></svg>Desktop
  </button>
</div>

<div class="mobile-shell" id="mobile-view">
  <div class="m-header">
    <div class="m-page-title">Settings</div>
    <div class="m-page-sub">Preferences &bull; Foundation v1.0</div>
  </div>
  <div class="m-scroll" id="m-settings"></div>
  <div class="m-bottom-nav">
    <div class="m-nav-item"><div class="m-nav-icon"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9L10 2.5 18 9"/><path d="M4.5 7.5V17.5H8.5V13H11.5V17.5H15.5V7.5"/></svg></div><div class="m-nav-label">Home</div></div>
    <div class="m-nav-item"><div class="m-nav-icon"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><rect x="2" y="2" width="6.5" height="6.5" rx="1"/><rect x="11.5" y="2" width="6.5" height="6.5" rx="1"/><rect x="2" y="11.5" width="6.5" height="6.5" rx="1"/><rect x="11.5" y="11.5" width="6.5" height="6.5" rx="1"/></svg></div><div class="m-nav-label">Projects</div></div>
    <div class="m-nav-item"><button class="m-fab"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="10" y1="3" x2="10" y2="17"/><line x1="3" y1="10" x2="17" y2="10"/></svg></button></div>
    <div class="m-nav-item"><div class="m-nav-icon"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7.5"/><path d="M10 6.5v7"/></svg></div><div class="m-nav-label">Budget</div></div>
    <div class="m-nav-item active"><div class="m-nav-icon"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="10" cy="10" r="2.5"/><path d="M10 2v1.5M10 16.5V18M2 10h1.5M16.5 10H18M4.4 4.4l1.1 1.1M14.5 14.5l1.1 1.1M4.4 15.6l1.1-1.1M14.5 5.5l1.1-1.1"/></svg></div><div class="m-nav-label" style="color:var(--gold)">Settings</div></div>
  </div>
</div>

<div class="desktop-shell" id="desktop-view">
  <div class="d-sidebar">
    <div style="margin-bottom:16px"><svg width="28" height="28" viewBox="0 0 34 34" fill="none"><circle cx="17" cy="17" r="15.5" stroke="#d4b978" stroke-width="0.7" opacity="0.55"/><path d="M17 3.5 L30.5 17 L17 30.5 L3.5 17 Z" stroke="#d4b978" stroke-width="0.7" fill="none"/><circle cx="17" cy="17" r="1.8" fill="#d4b978"/></svg></div>
    <div class="d-nav"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9L10 2.5 18 9"/><path d="M4.5 7.5V17.5H8.5V13H11.5V17.5H15.5V7.5"/></svg><span class="d-tip">Command</span></div>
    <div class="d-nav"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><rect x="2" y="2" width="6.5" height="6.5" rx="1"/><rect x="11.5" y="2" width="6.5" height="6.5" rx="1"/><rect x="2" y="11.5" width="6.5" height="6.5" rx="1"/><rect x="11.5" y="11.5" width="6.5" height="6.5" rx="1"/></svg><span class="d-tip">Projects</span></div>
    <div class="d-nav"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><rect x="2.5" y="2.5" width="15" height="15" rx="1"/><line x1="2.5" y1="7" x2="17.5" y2="7"/><line x1="7" y1="7" x2="7" y2="17.5"/></svg><span class="d-tip">Blueprint</span></div>
    <div class="d-nav"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><circle cx="10" cy="10" r="7.5"/><path d="M10 6.5v7"/></svg><span class="d-tip">Budget</span></div>
    <div class="d-nav"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M10 2.5L17.5 7v6L10 17.5 2.5 13V7z"/><polyline points="2.5,7 10,11.5 17.5,7"/><line x1="10" y1="11.5" x2="10" y2="17.5"/></svg><span class="d-tip">Materials</span></div>
    <div class="d-nav active"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><circle cx="10" cy="10" r="2.5"/><path d="M10 2v1.5M10 16.5V18M2 10h1.5M16.5 10H18M4.4 4.4l1.1 1.1M14.5 14.5l1.1 1.1M4.4 15.6l1.1-1.1M14.5 5.5l1.1-1.1"/></svg><span class="d-tip">Settings</span></div>
    <div class="d-sidebar-bot"><div class="d-avatar">L+M</div></div>
  </div>
  <div class="d-main">
    <div class="d-topbar">
      <div><div class="d-page-title">Settings</div></div>
      <button class="btn-primary" onclick="saveAll()">Save Changes</button>
    </div>
    <div id="d-settings"></div>
  </div>
</div>

<script>
var toggles = { notif_tasks:true, notif_delivery:true, notif_budget:false, notif_weekly:true, ai_notes:true, ai_suggestions:true, dark_mode:true, metric:false };

window.addEventListener('load', function() { render('m-settings'); render('d-settings'); });

function render(elId) {
  var el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = '<div class="settings-wrap">' + buildSettings() + '</div>';
}

function buildSettings() {
  var html = '';

  // House profile
  html += '<div class="settings-section">';
  html += '<div class="settings-section-title">House Profile</div>';
  html += '<div class="settings-card">';
  html += row('house', 'var(--gold-dim)', '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="var(--gold)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M2 7.5L8 2.5 14 7.5"/><rect x="3.5" y="7.5" width="9" height="6.5" rx="0.5"/><rect x="6" y="9.5" width="4" height="4.5"/></svg>', '4246 Elmwood Drive', 'Sacramento, CA &bull; Built 1987 &bull; 1,840 sqft', 'Edit', true);
  html += row('style', 'var(--raised)', '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="var(--muted)" stroke-width="1.3" stroke-linecap="round"><rect x="2" y="6" width="12" height="8" rx="0.5"/><path d="M2 6L8 1.5 14 6"/></svg>', 'Home Style', 'Ranch', 'Ranch', true);
  html += row('sqft', 'var(--raised)', '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="var(--muted)" stroke-width="1.3" stroke-linecap="round"><rect x="2" y="2" width="12" height="12" rx="1"/><line x1="2" y1="8" x2="14" y2="8"/><line x1="8" y1="2" x2="8" y2="14"/></svg>', 'Square Footage', '1,840 sqft', '1,840', true);
  html += '</div></div>';

  // Couple profiles
  html += '<div class="settings-section">';
  html += '<div class="settings-section-title">Your Team</div>';
  html += '<div class="profile-pair">';
  html += '<div class="profile-card">';
  html += '<div class="pc-avatar" style="background:var(--gold-dim);color:var(--gold)">L</div>';
  html += '<div class="pc-name">Leo</div><div class="pc-role">Primary</div>';
  html += '<div class="pc-field"><div class="pc-field-label">DIY Level</div><div class="pc-field-val">Hands-on builder</div></div>';
  html += '<div class="pc-field"><div class="pc-field-label">Weekends</div><div class="pc-field-val">Most weekends free</div></div>';
  html += '<button class="btn-ghost" style="width:100%;justify-content:center;margin-top:8px;font-size:11px" onclick="showToast(\'Edit profile coming soon\')">Edit</button>';
  html += '</div>';
  html += '<div class="profile-card">';
  html += '<div class="pc-avatar" style="background:var(--blue-dim);color:var(--blue-br)">M</div>';
  html += '<div class="pc-name">Partner</div><div class="pc-role">Collaborator</div>';
  html += '<div class="pc-field"><div class="pc-field-label">DIY Level</div><div class="pc-field-val">Capable, learns fast</div></div>';
  html += '<div class="pc-field"><div class="pc-field-label">Weekends</div><div class="pc-field-val">Most weekends free</div></div>';
  html += '<button class="btn-ghost" style="width:100%;justify-content:center;margin-top:8px;font-size:11px" onclick="showToast(\'Edit profile coming soon\')">Edit</button>';
  html += '</div></div></div>';

  // Notifications
  html += '<div class="settings-section">';
  html += '<div class="settings-section-title">Notifications</div>';
  html += '<div class="settings-card">';
  html += toggleRow('notif_tasks', 'Task Reminders', 'Get notified when tasks are due');
  html += toggleRow('notif_delivery', 'Delivery Alerts', 'Shopping list item delivery windows');
  html += toggleRow('notif_budget', 'Budget Warnings', 'Alert when spend approaches limit');
  html += toggleRow('notif_weekly', 'Weekly Summary', 'Sunday recap of progress and upcoming');
  html += '</div></div>';

  // AI
  html += '<div class="settings-section">';
  html += '<div class="settings-section-title">AI Features</div>';
  html += '<div class="settings-card">';
  html += toggleRow('ai_notes', 'Auto-analyze Brainstorm Notes', 'AI reads your notes when you open Brainstorm');
  html += toggleRow('ai_suggestions', 'Proactive Suggestions', 'AI surfaces insights on the dashboard daily brief');
  html += row('ai_model', 'var(--gold-dim)', '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="var(--gold)" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M8 1.5l1.4 3.1 3.5.35-2.45 2.45.7 3.5L8 9.3l-3.15 1.55.7-3.5L3.1 4.95l3.5-.35z"/></svg>', 'AI Model', 'Claude Sonnet', 'claude-sonnet-4', false);
  html += '</div></div>';

  // Integrations
  html += '<div class="settings-section">';
  html += '<div class="settings-section-title">Integrations</div>';
  html += '<div class="settings-card">';
  html += intRow('Google Calendar', 'Sync tasks and deadlines', true, 'leo@gmail.com');
  html += intRow('Amazon', 'Quick-link shopping items', false, '');
  html += intRow('Home Depot', 'Price lookup and store finder', false, '');
  html += intRow("Lowe's", 'Price lookup and inventory', false, '');
  html += '</div></div>';

  // Preferences
  html += '<div class="settings-section">';
  html += '<div class="settings-section-title">Preferences</div>';
  html += '<div class="settings-card">';
  html += toggleRow('dark_mode', 'Dark Mode', 'Always on for Foundation');
  html += toggleRow('metric', 'Use Metric Units', 'Switch from imperial to metric');
  html += row('currency', 'var(--raised)', '<svg width="14" height="14" viewBox="0 0 16 16" fill="none" stroke="var(--muted)" stroke-width="1.3" stroke-linecap="round"><circle cx="8" cy="8" r="6"/><path d="M8 4.5v7M6.5 6c0-.8.7-1.5 1.5-1.5s1.5.7 1.5 1.5S9 7.2 8 7.2s-1.5.5-1.5 1.3.7 1.5 1.5 1.5 1.5-.7 1.5-1.5"/></svg>', 'Currency', 'US Dollar (USD)', 'USD', true);
  html += '</div></div>';

  // Danger zone
  html += '<div class="settings-section">';
  html += '<div class="settings-section-title" style="color:var(--red-br)">Danger Zone</div>';
  html += '<div class="danger-card">';
  html += '<div class="danger-row"><div><div class="danger-label">Export All Data</div><div class="danger-sub">Download your full house profile and project history</div></div><button class="btn-danger" onclick="showToast(\'Exporting...\')">Export</button></div>';
  html += '<div class="danger-row"><div><div class="danger-label">Reset House Profile</div><div class="danger-sub">Clear all rooms and start onboarding again</div></div><button class="btn-danger" onclick="showToast(\'Are you sure? This cannot be undone.\')">Reset</button></div>';
  html += '<div class="danger-row"><div><div class="danger-label">Delete Account</div><div class="danger-sub">Permanently delete everything. Cannot be undone.</div></div><button class="btn-danger" onclick="showToast(\'Contact support to delete your account\')">Delete</button></div>';
  html += '</div></div>';

  // Version
  html += '<div style="text-align:center;padding:8px 0 24px;color:var(--muted);font-size:11px">Foundation by Ascension &bull; v1.0.0 &bull; Built with love</div>';

  return html;
}

function row(id, iconBg, iconSvg, label, sub, value, hasChevron) {
  return '<div class="settings-row' + (hasChevron ? '' : ' no-hover') + '" onclick="' + (hasChevron ? 'showToast(\'Edit ' + label + ' coming soon\')' : '') + '">' +
    '<div class="sr-left"><div class="sr-icon" style="background:' + iconBg + '">' + iconSvg + '</div><div><div class="sr-label">' + label + '</div><div class="sr-sub">' + sub + '</div></div></div>' +
    '<div class="sr-right"><span class="sr-value">' + value + '</span>' +
    (hasChevron ? '<svg class="sr-chevron" width="10" height="10" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="4,2 8,6 4,10"/></svg>' : '') +
    '</div></div>';
}

function toggleRow(id, label, sub) {
  var on = toggles[id];
  return '<div class="settings-row no-hover"><div class="sr-left"><div><div class="sr-label">' + label + '</div><div class="sr-sub">' + sub + '</div></div></div>' +
    '<div class="toggle' + (on ? ' on' : '') + '" onclick="flipToggle(\'' + id + '\')" id="tog-' + id + '"><div class="toggle-thumb"></div></div></div>';
}

function intRow(name, sub, connected, account) {
  var badge = connected ? '<span class="int-badge int-connected">Connected</span>' : '<span class="int-badge int-disconnected">Not Connected</span>';
  var action = connected ? 'Disconnect' : 'Connect';
  return '<div class="settings-row"><div class="sr-left"><div><div class="sr-label">' + name + '</div><div class="sr-sub">' + sub + (account ? ' &bull; ' + account : '') + '</div></div></div>' +
    '<div class="sr-right">' + badge + '<button class="btn-ghost" style="font-size:11px;padding:5px 10px" onclick="showToast(\'' + action + ' ' + name + ' coming soon\')">' + action + '</button></div></div>';
}

function flipToggle(id) {
  toggles[id] = !toggles[id];
  var el = document.getElementById('tog-' + id);
  if (el) el.className = 'toggle' + (toggles[id] ? ' on' : '');
  showToast((toggles[id] ? 'Enabled: ' : 'Disabled: ') + id.replace(/_/g,' '));
}

function saveAll() { showToast('Settings saved'); }
function setView(mode) { document.body.className='mode-'+mode; document.getElementById('btn-mobile').classList.toggle('active',mode==='mobile'); document.getElementById('btn-desktop').classList.toggle('active',mode==='desktop'); render('m-settings'); render('d-settings'); }
function showToast(msg) {
  var t=document.getElementById('te'); if(!t){t=document.createElement('div');t.id='te';t.style.cssText='position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--raised);border:1px solid var(--border-warm);color:var(--white);font-size:12px;padding:10px 20px;border-radius:10px;z-index:99999;white-space:nowrap;opacity:0;transition:opacity 0.25s;font-family:\'DM Sans\',sans-serif;';document.body.appendChild(t);}
  t.textContent=msg;t.style.opacity='1';clearTimeout(t._t);t._t=setTimeout(function(){t.style.opacity='0';},2400);
}
</script>
</body>
</html>
