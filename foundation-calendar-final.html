<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<title>Calendar -- Foundation</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600;700&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
/* TOKENS */
:root{
  --void:#0b0b0c;--base:#111113;--card:#161618;--raised:#1c1c1f;--lift:#242428;
  --border:rgba(255,255,255,0.055);--border-warm:rgba(210,185,130,0.22);
  --gold:#d4b978;--gold-br:#ecd49a;--gold-dim:rgba(212,185,120,0.08);
  --white:#ede9e3;--muted:#5c5850;--soft:#8a8478;
  --green:#4e7a5e;--green-br:#72b08a;--green-dim:rgba(78,122,94,0.12);
  --red-br:#cc8888;--red-dim:rgba(204,136,136,0.1);
  --amber:#d4903a;--amber-dim:rgba(212,144,58,0.12);
  --blue-br:#7aaac8;--blue-dim:rgba(122,170,200,0.1);
  --purple:#a07ac8;--purple-dim:rgba(160,122,200,0.1);
  --orange:#c87941;--orange-dim:rgba(200,121,65,0.12);
  --r:16px;--r-sm:10px;
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{background:#080809;color:var(--white);font-family:'DM Sans',sans-serif;overflow:hidden;}
svg{display:block;flex-shrink:0;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:rgba(212,185,120,0.18);border-radius:4px;}
.atmo{position:fixed;inset:0;pointer-events:none;z-index:0;
  background:radial-gradient(ellipse 65% 45% at 50% -8%,rgba(212,185,120,0.065) 0%,transparent 60%),
    radial-gradient(ellipse 35% 55% at 95% 55%,rgba(78,122,94,0.028) 0%,transparent 55%),
    radial-gradient(ellipse 30% 40% at 5% 85%,rgba(122,170,200,0.02) 0%,transparent 50%);}
.grid-bg{position:fixed;inset:0;pointer-events:none;z-index:0;opacity:0.018;
  background-image:linear-gradient(var(--gold) 1px,transparent 1px),linear-gradient(90deg,var(--gold) 1px,transparent 1px);
  background-size:48px 48px;}

/* VIEW TOGGLE */
.view-toggle{position:fixed;top:14px;left:50%;transform:translateX(-50%);z-index:9999;
  display:flex;align-items:center;background:rgba(11,11,12,0.92);border:1px solid var(--border-warm);
  border-radius:12px;padding:4px;backdrop-filter:blur(20px);box-shadow:0 8px 32px rgba(0,0,0,0.5);}
.vbtn{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:8px;
  font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;letter-spacing:0.05em;
  cursor:pointer;border:none;background:transparent;color:var(--muted);transition:all 0.2s;}
.vbtn.active{background:var(--gold);color:#0b0b0c;font-weight:600;}
.vdiv{width:1px;height:18px;background:var(--border);margin:0 2px;}

/* MOBILE SHELL */
body.mode-mobile{display:flex;justify-content:center;align-items:flex-start;padding-top:60px;padding-bottom:40px;}
body.mode-mobile .desktop-shell{display:none;}
.mobile-shell{width:390px;height:844px;border-radius:44px;overflow:hidden;flex-shrink:0;
  box-shadow:0 0 0 10px #0d0d0f,0 0 0 12px #1e1e22,0 0 0 13px #0d0d0f,0 40px 100px rgba(0,0,0,0.9);
  background:var(--void);display:flex;flex-direction:column;position:relative;}
.mobile-shell::before{content:'';position:absolute;top:0;left:50%;transform:translateX(-50%);
  width:126px;height:34px;background:#0d0d0f;border-radius:0 0 22px 22px;z-index:200;pointer-events:none;}
.m-scroll{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(212,185,120,0.18) transparent;}

/* DESKTOP SHELL */
body.mode-desktop{overflow:hidden;display:block;}
body.mode-desktop .mobile-shell{display:none;}
.desktop-shell{display:grid;grid-template-columns:64px 1fr;height:100vh;padding-top:52px;}
.d-main{display:flex;flex-direction:column;overflow:hidden;height:calc(100vh - 52px);}
.d-topbar{padding:18px 32px 14px;display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--border);flex-shrink:0;background:var(--void);}
.d-topbar-left{display:flex;flex-direction:column;gap:2px;}
.d-page-title{font-family:'Cinzel',serif;font-size:20px;font-weight:700;letter-spacing:0.1em;}
.d-page-sub{font-size:11px;color:var(--muted);}
.d-topbar-right{display:flex;align-items:center;gap:10px;}
.d-screen-content{flex:1;overflow:hidden;}

/* SIDEBAR */
.d-sidebar{background:var(--base);border-right:1px solid var(--border);display:flex;flex-direction:column;
  align-items:center;padding:20px 0;gap:4px;height:calc(100vh - 52px);}
.d-nav-item{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;
  cursor:pointer;transition:all 0.2s;color:var(--muted);position:relative;}
.d-nav-item:hover{color:var(--white);background:var(--raised);}
.d-nav-item.active{color:var(--gold);background:var(--gold-dim);}
.d-nav-item.active::before{content:'';position:absolute;left:-1px;width:2px;height:18px;
  background:var(--gold);border-radius:0 2px 2px 0;}
.d-tooltip{position:absolute;left:50px;background:var(--raised);border:1px solid var(--border);
  color:var(--white);font-size:10px;letter-spacing:0.08em;text-transform:uppercase;padding:5px 10px;
  border-radius:6px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity 0.15s;z-index:100;}
.d-nav-item:hover .d-tooltip{opacity:1;}
.d-sidebar-bot{margin-top:auto;display:flex;flex-direction:column;align-items:center;gap:8px;}
.d-avatar{width:30px;height:30px;border-radius:50%;background:var(--gold-dim);border:1px solid var(--gold);
  display:flex;align-items:center;justify-content:center;font-size:9px;color:var(--gold);font-weight:700;cursor:pointer;}

/* BUTTONS */
.btn-primary{display:flex;align-items:center;justify-content:center;gap:7px;padding:10px 18px;
  border-radius:var(--r-sm);background:var(--gold);color:#0b0b0c;font-family:'DM Sans',sans-serif;
  font-size:13px;font-weight:600;border:none;cursor:pointer;transition:all 0.2s;white-space:nowrap;}
.btn-primary:hover{background:var(--gold-br);}
.btn-ghost{display:flex;align-items:center;gap:6px;padding:8px 13px;border-radius:8px;
  background:transparent;border:1px solid var(--border);color:var(--soft);font-family:'DM Sans',sans-serif;
  font-size:12px;font-weight:500;cursor:pointer;transition:all 0.18s;white-space:nowrap;}
.btn-ghost:hover{border-color:var(--border-warm);color:var(--white);}

/* BOTTOM NAV */
.m-bottom-nav{display:flex;align-items:center;justify-content:space-around;padding:8px 0 28px;
  border-top:1px solid var(--border);background:var(--void);flex-shrink:0;z-index:100;}
.m-nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 10px;cursor:pointer;}
.m-nav-icon{display:flex;align-items:center;justify-content:center;color:var(--muted);transition:color 0.18s;}
.m-nav-label{font-size:8px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);transition:color 0.18s;}
.m-nav-item.active .m-nav-label,.m-nav-item.active .m-nav-icon{color:var(--gold);}
.m-fab{width:50px;height:50px;border-radius:50%;background:var(--gold);display:flex;align-items:center;
  justify-content:center;color:#0b0b0c;box-shadow:0 4px 20px rgba(212,185,120,0.35);cursor:pointer;border:none;}

/* ================================================================
   CALENDAR-SPECIFIC STYLES
================================================================ */

/* Month nav */
.cal-nav{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 12px;}
.cal-month{font-family:'Cinzel',serif;font-size:18px;font-weight:700;letter-spacing:0.1em;}
.cal-year{font-size:12px;color:var(--muted);margin-top:2px;}
.cal-nav-btn{width:34px;height:34px;border-radius:9px;background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;cursor:pointer;color:var(--soft);transition:all 0.18s;}
.cal-nav-btn:hover{border-color:var(--border-warm);color:var(--white);}

/* Calendar grid */
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;padding:0 12px 12px;}
.cal-dow{font-size:9px;font-weight:600;letter-spacing:0.1em;text-transform:uppercase;
  color:var(--muted);text-align:center;padding:6px 0;}
.cal-cell{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;
  justify-content:flex-start;padding:5px 3px;cursor:pointer;transition:background 0.15s;position:relative;}
.cal-cell:hover{background:var(--raised);}
.cal-cell.today .cal-day{background:var(--gold);color:#0b0b0c;border-radius:50%;
  width:24px;height:24px;display:flex;align-items:center;justify-content:center;}
.cal-cell.selected{background:var(--gold-dim);border:1px solid var(--border-warm);}
.cal-cell.other-month .cal-day{color:var(--muted);}
.cal-day{font-size:13px;font-weight:500;color:var(--white);width:24px;height:24px;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.cal-dots{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap;justify-content:center;max-width:28px;}
.cal-dot{width:5px;height:5px;border-radius:50%;flex-shrink:0;}

/* Event list */
.ev-hdr{padding:12px 20px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.ev-date-label{font-family:'Cinzel',serif;font-size:14px;font-weight:600;letter-spacing:0.08em;}
.ev-count{font-size:11px;color:var(--muted);margin-top:2px;}
.ev-item{display:flex;align-items:flex-start;gap:12px;padding:12px 20px;
  border-bottom:1px solid var(--border);transition:background 0.15s;}
.ev-item:hover{background:rgba(255,255,255,0.014);}
.ev-item:last-child{border-bottom:none;}
.ev-color-bar{width:3px;height:100%;min-height:36px;border-radius:2px;flex-shrink:0;}
.ev-body{flex:1;min-width:0;}
.ev-title{font-size:13px;font-weight:500;color:var(--white);margin-bottom:3px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.ev-meta{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.ev-time{font-size:10px;color:var(--muted);}
.ev-proj{display:inline-flex;align-items:center;gap:4px;font-size:10px;color:var(--soft);}
.ev-who{font-size:9px;font-weight:600;padding:2px 7px;border-radius:10px;background:var(--raised);color:var(--soft);}

/* Gantt */
.gantt-wrap{overflow-x:auto;scrollbar-width:thin;scrollbar-color:rgba(212,185,120,0.18) transparent;}
.gantt-header{display:flex;align-items:center;padding:10px 20px 6px;border-bottom:1px solid var(--border);}
.gantt-title{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--soft);margin-right:16px;min-width:120px;}
.gantt-days-hdr{display:flex;gap:0;flex:1;}
.gantt-day-lbl{font-size:9px;color:var(--muted);text-align:center;min-width:28px;}
.gantt-row{display:flex;align-items:center;padding:6px 20px;border-bottom:1px solid var(--border);}
.gantt-row:last-child{border-bottom:none;}
.gantt-proj-name{font-size:12px;font-weight:500;color:var(--white);min-width:120px;
  overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.gantt-track{flex:1;position:relative;height:16px;}
.gantt-bar{position:absolute;height:10px;top:3px;border-radius:3px;display:flex;align-items:center;
  padding:0 6px;overflow:hidden;}
.gantt-bar-label{font-size:8px;font-weight:600;color:rgba(255,255,255,0.85);white-space:nowrap;}

/* Tab bar (mobile) */
.cal-tab-bar{display:flex;background:var(--card);border-bottom:1px solid var(--border);flex-shrink:0;}
.cal-tab{flex:1;padding:10px 8px;font-size:11px;font-weight:500;color:var(--muted);cursor:pointer;
  transition:all 0.18s;border-bottom:2px solid transparent;display:flex;align-items:center;
  justify-content:center;gap:5px;}
.cal-tab.active{color:var(--gold);border-bottom-color:var(--gold);}
.cal-panel{display:none;flex:1;flex-direction:column;overflow:hidden;}
.cal-panel.active{display:flex;}

/* Upcoming strip */
.upcoming-item{display:flex;align-items:center;gap:10px;padding:10px 20px;
  border-bottom:1px solid var(--border);transition:background 0.15s;}
.upcoming-item:hover{background:rgba(255,255,255,0.014);}
.upc-date-badge{width:40px;height:40px;border-radius:10px;background:var(--raised);
  border:1px solid var(--border);display:flex;flex-direction:column;align-items:center;
  justify-content:center;flex-shrink:0;}
.upc-day-num{font-family:'Cinzel',serif;font-size:14px;font-weight:700;color:var(--white);line-height:1;}
.upc-day-name{font-size:8px;text-transform:uppercase;letter-spacing:0.08em;color:var(--muted);margin-top:1px;}
.upc-content{flex:1;min-width:0;}
.upc-title{font-size:13px;font-weight:500;color:var(--white);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.upc-proj{font-size:10px;color:var(--muted);margin-top:2px;display:flex;align-items:center;gap:4px;}

/* Desktop layout */
.cal-desktop-grid{display:grid;grid-template-columns:1fr 300px;height:100%;overflow:hidden;}
.cal-desktop-left{display:flex;flex-direction:column;border-right:1px solid var(--border);overflow:hidden;}
.cal-desktop-right{display:flex;flex-direction:column;overflow:hidden;}
.cal-desktop-right-section{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(212,185,120,0.18) transparent;}
.cal-section-hdr{padding:14px 18px 8px;border-bottom:1px solid var(--border);flex-shrink:0;}
.cal-section-title{font-family:'Cinzel',serif;font-size:10px;font-weight:600;letter-spacing:0.14em;
  text-transform:uppercase;color:var(--soft);}

/* Project legend */
.proj-legend{display:flex;align-items:center;gap:7px;padding:7px 20px;
  border-bottom:1px solid var(--border);}
.proj-legend-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.proj-legend-name{font-size:11px;color:var(--soft);}
.proj-legend-count{font-size:10px;color:var(--muted);margin-left:auto;}

/* Sync button */
.sync-btn{display:flex;align-items:center;gap:7px;padding:9px 16px;margin:12px;
  border-radius:var(--r-sm);background:var(--raised);border:1px solid var(--border);
  color:var(--soft);font-family:'DM Sans',sans-serif;font-size:12px;cursor:pointer;transition:all 0.18s;}
.sync-btn:hover{border-color:var(--border-warm);color:var(--white);}

/* Empty state */
.ev-empty{padding:32px 20px;text-align:center;display:flex;flex-direction:column;align-items:center;gap:10px;}
.ev-empty-icon{width:40px;height:40px;border-radius:12px;background:var(--gold-dim);
  border:1px solid var(--border-warm);display:flex;align-items:center;justify-content:center;color:var(--gold);}
.ev-empty-text{font-size:12px;color:var(--muted);line-height:1.6;}

@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulseDot{0%,100%{box-shadow:0 0 0 0 rgba(114,176,138,0.35)}70%{box-shadow:0 0 0 7px rgba(114,176,138,0)}}
</style>
</head>
<body class="mode-mobile">
<div class="atmo"></div>
<div class="grid-bg"></div>

<!-- VIEW TOGGLE -->
<div class="view-toggle">
  <button class="vbtn active" id="btn-mobile" onclick="setView('mobile')">
    <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="3" y="1" width="8" height="12" rx="1.5"/><circle cx="7" cy="10.5" r="0.8" fill="currentColor" stroke="none"/></svg>Mobile
  </button>
  <div class="vdiv"></div>
  <button class="vbtn" id="btn-desktop" onclick="setView('desktop')">
    <svg width="11" height="11" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"><rect x="1" y="2" width="12" height="8" rx="1"/><line x1="4" y1="12" x2="10" y2="12"/><line x1="7" y1="10" x2="7" y2="12"/></svg>Desktop
  </button>
</div>

<!-- ================================================================
     MOBILE SHELL
================================================================ -->
<div class="mobile-shell" id="mobile-view">

  <!-- HEADER -->
  <div style="padding:42px 18px 0;flex-shrink:0;">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
      <div>
        <div style="font-family:'Cinzel',serif;font-size:20px;font-weight:700;letter-spacing:0.1em;">Calendar</div>
        <div style="font-size:11px;color:var(--muted);" id="m-cal-month-sub">March 2025</div>
      </div>
      <div style="display:flex;gap:7px;">
        <button class="btn-ghost" style="padding:8px 10px;" onclick="syncCal()">
          <svg width="13" height="13" viewBox="0 0 15 15" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M13 7.5A5.5 5.5 0 112 7.5"/><polyline points="2,4 2,7.5 5.5,7.5"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- TAB BAR -->
  <div class="cal-tab-bar" style="flex-shrink:0;">
    <div class="cal-tab active" id="m-tab-cal" onclick="mTab('cal')">
      <svg width="11" height="11" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><rect x="1.5" y="2.5" width="10" height="9" rx="1"/><line x1="1.5" y1="5.5" x2="11.5" y2="5.5"/><line x1="4" y1="1" x2="4" y2="4"/><line x1="9" y1="1" x2="9" y2="4"/></svg>Calendar
    </div>
    <div class="cal-tab" id="m-tab-upcoming" onclick="mTab('upcoming')">
      <svg width="11" height="11" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><line x1="2" y1="3" x2="11" y2="3"/><line x1="2" y1="6" x2="11" y2="6"/><line x1="2" y1="9" x2="7" y2="9"/></svg>Upcoming
    </div>
    <div class="cal-tab" id="m-tab-gantt" onclick="mTab('gantt')">
      <svg width="11" height="11" viewBox="0 0 13 13" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><line x1="1.5" y1="3.5" x2="8" y2="3.5"/><line x1="3" y1="6.5" x2="11.5" y2="6.5"/><line x1="1.5" y1="9.5" x2="7" y2="9.5"/></svg>Timeline
    </div>
  </div>

  <!-- CAL PANEL -->
  <div class="cal-panel active" id="m-panel-cal">
    <div id="m-cal-nav"></div>
    <div id="m-cal-grid" style="flex-shrink:0;"></div>
    <div style="flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(212,185,120,0.18) transparent;">
      <div id="m-cal-events"></div>
    </div>
  </div>

  <!-- UPCOMING PANEL -->
  <div class="cal-panel" id="m-panel-upcoming">
    <div style="flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(212,185,120,0.18) transparent;">
      <div id="m-upcoming"></div>
    </div>
  </div>

  <!-- GANTT PANEL -->
  <div class="cal-panel" id="m-panel-gantt">
    <div style="flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:rgba(212,185,120,0.18) transparent;">
      <div id="m-gantt"></div>
    </div>
  </div>

  <!-- BOTTOM NAV -->
  <div class="m-bottom-nav">
    <div class="m-nav-item" data-screen="dashboard" onclick="navigate('dashboard')">
      <div class="m-nav-icon"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round" stroke-linejoin="round"><path d="M2 9L10 2.5 18 9"/><path d="M4.5 7.5V17.5H8.5V13H11.5V17.5H15.5V7.5"/></svg></div>
      <div class="m-nav-label">Home</div>
    </div>
    <div class="m-nav-item" data-screen="projects" onclick="navigate('projects')">
      <div class="m-nav-icon"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><rect x="2" y="2" width="6.5" height="6.5" rx="1"/><rect x="11.5" y="2" width="6.5" height="6.5" rx="1"/><rect x="2" y="11.5" width="6.5" height="6.5" rx="1"/><rect x="11.5" y="11.5" width="6.5" height="6.5" rx="1"/></svg></div>
      <div class="m-nav-label">Projects</div>
    </div>
    <div class="m-nav-item"><button class="m-fab" onclick="showToast('Add event coming soon')"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"><line x1="10" y1="3" x2="10" y2="17"/><line x1="3" y1="10" x2="17" y2="10"/></svg></button></div>
    <div class="m-nav-item active" data-screen="calendar">

<script>
'use strict';

var EVENTS = [
  { date:12, title:'Install upper cabinets', proj:'Kitchen', color:'#d4903a', time:'All day', who:'Leo' },
  { date:13, title:'Second coat fence panels', proj:'Fence', color:'#7aaac8', time:'Morning', who:'Both' },
  { date:13, title:'Order tile grout float', proj:'Kitchen', color:'#d4903a', time:'Today', who:'Leo' },
  { date:14, title:'Plumber rough-in visit', proj:'Kitchen', color:'#d4903a', time:'9:00 AM', who:'Contractor' },
  { date:15, title:'Fence final coat + sealant', proj:'Fence', color:'#7aaac8', time:'Morning', who:'Both' },
  { date:16, title:'Fence cleanup + touch-ups', proj:'Fence', color:'#7aaac8', time:'Afternoon', who:'Leo' },
  { date:18, title:'Tile backsplash row 1', proj:'Kitchen', color:'#d4903a', time:'All day', who:'Leo' },
  { date:20, title:'Cabinet hardware install', proj:'Hardware', color:'#d4b978', time:'Weekend', who:'Both' },
  { date:21, title:'Tile backsplash row 2-3', proj:'Kitchen', color:'#d4903a', time:'All day', who:'Leo' },
  { date:22, title:'Grout backsplash', proj:'Kitchen', color:'#d4903a', time:'All day', who:'Both' },
  { date:25, title:'Final inspection', proj:'Kitchen', color:'#d4903a', time:'10:00 AM', who:'Inspector' },
  { date:28, title:'Kitchen punch list', proj:'Kitchen', color:'#d4903a', time:'All day', who:'Both' }
];

var GANTT_PROJECTS = [
  { name:'Kitchen Remodel', color:'#d4903a', start:1, end:28, pct:58 },
  { name:'Back Fence',      color:'#7aaac8', start:8, end:16, pct:40 },
  { name:'Cabinet Hardware',color:'#d4b978', start:18, end:22, pct:0  },
  { name:'Garage Plan',     color:'#72b08a', start:25, end:31, pct:0  }
];

var PROJ_LEGEND = [
  { name:'Kitchen Remodel',  color:'#d4903a', count:8 },
  { name:'Back Fence',       color:'#7aaac8', count:3 },
  { name:'Cabinet Hardware', color:'#d4b978', count:1 }
];

var currentMonth = 2;  // 0-indexed March
var currentYear  = 2025;
var selectedDay  = 12;
var currentMTab  = 'cal';

var MONTHS = ['January','February','March','April','May','June',
              'July','August','September','October','November','December'];
var DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

function navigate(to) {
  if (to === 'calendar') return;
  window.location.href = 'foundation-' + to + '.html';
}

function setView(mode) {
  document.body.className = 'mode-' + mode;
  document.getElementById('btn-mobile').classList.toggle('active', mode === 'mobile');
  document.getElementById('btn-desktop').classList.toggle('active', mode === 'desktop');
}

function showToast(msg) {
  var t = document.getElementById('toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'toast';
    t.style.position = 'fixed';
    t.style.bottom = '90px';
    t.style.left = '50%';
    t.style.transform = 'translateX(-50%)';
    t.style.background = 'var(--raised)';
    t.style.border = '1px solid var(--border-warm)';
    t.style.color = 'var(--white)';
    t.style.fontSize = '12px';
    t.style.padding = '10px 20px';
    t.style.borderRadius = '10px';
    t.style.zIndex = '9999';
    t.style.whiteSpace = 'nowrap';
    t.style.opacity = '0';
    t.style.transition = 'opacity 0.25s';
    t.style.pointerEvents = 'none';
    document.body.appendChild(t);
  }
  t.textContent = msg;
  t.style.opacity = '1';
  clearTimeout(t._t);
  t._t = setTimeout(function() { t.style.opacity = '0'; }, 2400);
}

function mTab(tab) {
  currentMTab = tab;
  ['cal','upcoming','gantt'].forEach(function(t) {
    var tabEl   = document.getElementById('m-tab-' + t);
    var panelEl = document.getElementById('m-panel-' + t);
    if (tabEl)   tabEl.classList.toggle('active', t === tab);
    if (panelEl) panelEl.classList.toggle('active', t === tab);
  });
}

function selectDay(day) {
  selectedDay = day;
  renderAll();
}

function prevMonth() {
  currentMonth--;
  if (currentMonth < 0) { currentMonth = 11; currentYear--; }
  selectedDay = 1;
  renderAll();
}
function nextMonth() {
  currentMonth++;
  if (currentMonth > 11) { currentMonth = 0; currentYear++; }
  selectedDay = 1;
  renderAll();
}

function syncCal() { showToast('Google Calendar sync coming soon'); }

/* -------- RENDER FUNCTIONS -------- */

function renderAll() {
  renderCalNav('m-cal-nav');
  renderCalNav('d-cal-nav');
  renderCalGrid('m-cal-grid');
  renderCalGrid('d-cal-grid');
  renderEvents('m-cal-events');
  renderEvents('d-cal-events');
  renderUpcoming('m-upcoming');
  renderUpcoming('d-upcoming');
  renderGantt('m-gantt');
  renderGantt('d-gantt');
  renderProjLegend();
  // Update topbar sub
  var subEl = document.getElementById('d-cal-topbar-sub');
  if (subEl) subEl.textContent = MONTHS[currentMonth] + ' ' + currentYear + ' - 4246 Elmwood Drive';
  var mSub = document.getElementById('m-cal-month-sub');
  if (mSub) mSub.textContent = MONTHS[currentMonth] + ' ' + currentYear;
}

function renderCalNav(elId) {
  var el = document.getElementById(elId);
  if (!el) return;
  el.innerHTML = '<div class="cal-nav">'
    + '<button class="cal-nav-btn" onclick="prevMonth()">'
    + '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="8.5,3 5,7 8.5,11"/></svg>'
    + '</button>'
    + '<div><div class="cal-month">' + MONTHS[currentMonth] + '</div><div class="cal-year">' + currentYear + '</div></div>'
    + '<button class="cal-nav-btn" onclick="nextMonth()">'
    + '<svg width="14" height="14" viewBox="0 0 14 14" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="5.5,3 9,7 5.5,11"/></svg>'
    + '</button></div>';
}

function renderCalGrid(elId) {
  var el = document.getElementById(elId);
  if (!el) return;

  var today = new Date();
  var isCurrentMonth = (today.getFullYear() === currentYear && today.getMonth() === currentMonth);
  var firstDay    = new Date(currentYear, currentMonth, 1).getDay();
  var daysInMonth = new Date(currentYear, currentMonth + 1, 0).getDate();
  var prevDays    = new Date(currentYear, currentMonth, 0).getDate();

  // Map events to dates
  var eventDates = {};
  EVENTS.forEach(function(e) {
    if (!eventDates[e.date]) eventDates[e.date] = [];
    eventDates[e.date].push(e);
  });

  var html = '<div class="cal-grid">';
  // Day of week headers
  DAYS.forEach(function(d) {
    html += '<div class="cal-dow">' + d + '</div>';
  });

  // Previous month padding
  for (var p = firstDay - 1; p >= 0; p--) {
    html += '<div class="cal-cell other-month"><div class="cal-day">' + (prevDays - p) + '</div></div>';
  }

  // Current month days
  for (var d2 = 1; d2 <= daysInMonth; d2++) {
    var isToday    = isCurrentMonth && d2 === today.getDate();
    var isSelected = d2 === selectedDay;
    var dayEvents  = eventDates[d2] || [];
    var cls = 'cal-cell';
    if (isToday)    cls += ' today';
    if (isSelected) cls += ' selected';

    html += '<div class="' + cls + '" data-day="' + d2 + '" onclick="selectDay(' + d2 + ')">';
    html += '<div class="cal-day">' + d2 + '</div>';
    if (dayEvents.length > 0) {
      html += '<div class="cal-dots">';
      dayEvents.slice(0, 3).forEach(function(e) {
        html += '<div class="cal-dot" style="background:' + e.color + ';"></div>';
      });
      html += '</div>';
    }
    html += '</div>';
  }

  // Next month padding
  var totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
  var nextDay = 1;
  for (var n = firstDay + daysInMonth; n < totalCells; n++) {
    html += '<div class="cal-cell other-month"><div class="cal-day">' + nextDay + '</div></div>';
    nextDay++;
  }

  html += '</div>';
  el.innerHTML = html;
}

function renderEvents(elId) {
  var el = document.getElementById(elId);
  if (!el) return;

  var dayEvents = EVENTS.filter(function(e) { return e.date === selectedDay; });

  // Update section title
  var secTitle = document.getElementById('d-ev-section-title');
  if (secTitle) {
    secTitle.textContent = MONTHS[currentMonth] + ' ' + selectedDay + ' Events';
  }

  var dateLabel = MONTHS[currentMonth] + ' ' + selectedDay;

  if (dayEvents.length === 0) {
    el.innerHTML = '<div class="ev-empty">'
      + '<div class="ev-empty-icon"><svg width="18" height="18" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"><rect x="2.5" y="4" width="15" height="13.5" rx="1"/><line x1="2.5" y1="8.5" x2="17.5" y2="8.5"/></svg></div>'
      + '<div class="ev-empty-text">No events on ' + dateLabel + '.<br>Tap a day with colored dots to see events.</div>'
      + '</div>';
    return;
  }

  var html = '<div class="ev-hdr">'
    + '<div class="ev-date-label">' + dateLabel + '</div>'
    + '<div class="ev-count">' + dayEvents.length + ' event' + (dayEvents.length !== 1 ? 's' : '') + '</div>'
    + '</div>';

  dayEvents.forEach(function(e) {
    html += '<div class="ev-item" style="animation:fadeUp 0.25s ease both;">'
      + '<div class="ev-color-bar" style="background:' + e.color + ';width:3px;border-radius:2px;align-self:stretch;flex-shrink:0;"></div>'
      + '<div class="ev-body">'
      + '<div class="ev-title">' + e.title + '</div>'
      + '<div class="ev-meta">'
      + '<span class="ev-time">' + e.time + '</span>'
      + '<span class="ev-proj"><span style="width:6px;height:6px;border-radius:50%;background:' + e.color + ';display:inline-block;"></span>' + e.proj + '</span>'
      + '<span class="ev-who">' + e.who + '</span>'
      + '</div></div></div>';
  });

  el.innerHTML = html;
}

function renderUpcoming(elId) {
  var el = document.getElementById(elId);
  if (!el) return;

  var upcoming = EVENTS.filter(function(e) { return e.date >= selectedDay; })
    .sort(function(a, b) { return a.date - b.date; });

  if (upcoming.length === 0) {
    el.innerHTML = '<div class="ev-empty"><div class="ev-empty-text">No upcoming events this month.</div></div>';
    return;
  }

  var html = '';
  var lastDate = -1;
  upcoming.forEach(function(e, i) {
    if (e.date !== lastDate) {
      var d = new Date(currentYear, currentMonth, e.date);
      var dayName = DAYS[d.getDay()];
      html += '<div class="upcoming-item" style="animation:fadeUp 0.3s ' + (i*0.05) + 's ease both;">'
        + '<div class="upc-date-badge">'
        + '<div class="upc-day-num">' + e.date + '</div>'
        + '<div class="upc-day-name">' + dayName + '</div>'
        + '</div>'
        + '<div class="upc-content">'
        + '<div class="upc-title">' + e.title + '</div>'
        + '<div class="upc-proj"><span style="width:5px;height:5px;border-radius:50%;background:' + e.color + ';display:inline-block;"></span>' + e.proj + ' &bull; ' + e.time + '</div>'
        + '</div>'
        + '<span class="ev-who">' + e.who + '</span>'
        + '</div>';
      lastDate = e.date;
    } else {
      // Same date, no badge
      html += '<div class="upcoming-item" style="padding-left:72px;">'
        + '<div class="upc-content">'
        + '<div class="upc-title">' + e.title + '</div>'
        + '<div class="upc-proj"><span style="width:5px;height:5px;border-radius:50%;background:' + e.color + ';display:inline-block;"></span>' + e.proj + ' &bull; ' + e.time + '</div>'
        + '</div>'
        + '<span class="ev-who">' + e.who + '</span>'
        + '</div>';
    }
  });

  el.innerHTML = html;
}

function renderGantt(elId) {
  var el = document.getElementById(elId);
  if (!el) return;

  var totalDays = new Date(currentYear, currentMonth + 1, 0).getDate();
  var cellW = 28;

  // Header: day numbers
  var dayHeaders = '';
  for (var i = 1; i <= totalDays; i += 3) {
    dayHeaders += '<div class="gantt-day-lbl" style="min-width:' + (cellW*3) + 'px;">' + i + '</div>';
  }

  var html = '<div class="gantt-wrap" style="min-width:' + (120 + totalDays*cellW) + 'px;">'
    + '<div class="gantt-header">'
    + '<div class="gantt-title"></div>'
    + '<div class="gantt-days-hdr">' + dayHeaders + '</div>'
    + '</div>';

  GANTT_PROJECTS.forEach(function(proj) {
    var barLeft  = (proj.start - 1) / totalDays * 100;
    var barWidth = (proj.end - proj.start + 1) / totalDays * 100;

    html += '<div class="gantt-row">'
      + '<div class="gantt-proj-name"><span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:' + proj.color + ';margin-right:7px;vertical-align:middle;"></span>' + proj.name + '</div>'
      + '<div class="gantt-track" style="width:' + (totalDays*cellW) + 'px;">'
      + '<div class="gantt-bar" style="background:' + proj.color + ';opacity:0.85;left:' + barLeft.toFixed(1) + '%;width:' + barWidth.toFixed(1) + '%;">'
      + '<span class="gantt-bar-label">' + proj.pct + '%</span>'
      + '</div>'
      + '</div></div>';
  });

  html += '</div>';
  el.innerHTML = html;
}

function renderProjLegend() {
  var el = document.getElementById('d-proj-legend');
  if (!el) return;
  el.innerHTML = PROJ_LEGEND.map(function(p) {
    return '<div class="proj-legend">'
      + '<div class="proj-legend-dot" style="background:' + p.color + ';"></div>'
      + '<div class="proj-legend-name">' + p.name + '</div>'
      + '<div class="proj-legend-count">' + p.count + ' events</div>'
      + '</div>';
  }).join('');
}

window.addEventListener('load', function() {
  renderAll();
});
</script>
</body>
</html>
